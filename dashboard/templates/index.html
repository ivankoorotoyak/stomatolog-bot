<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вселенная Улыбка — Дашборд</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌌 Вселенная Улыбка</h1>
            <div id="currentTime"></div>
        </div>
        
        <button class="refresh-btn" onclick="loadStats()">⟳ Обновить</button>
        
        <div class="grid">
            <div class="card">
                <div class="card-title">🌙 Сны</div>
                <div class="card-value" id="totalDreams">0</div>
                <div id="dreamsWithImages">с картинками: 0</div>
            </div>
            
            <div class="card">
                <div class="card-title">⭐ Stars</div>
                <div class="card-value" id="totalStars">0</div>
                <div id="totalPurchases">покупок: 0</div>
            </div>
            
            <div class="card">
                <div class="card-title">👥 Пользователи</div>
                <div class="card-value" id="totalUsers">0</div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">📊 Активность за 7 дней</div>
            <div class="chart-container" id="chartContainer"></div>
        </div>
        
        <div class="card">
            <div class="card-title">🤖 Статус ботов</div>
            <div class="bots-grid" id="botsGrid"></div>
        </div>
        
        <div class="grid">
            <div class="card">
                <div class="card-title">🌙 Последние сны</div>
                <div class="activity-list" id="recentDreams"></div>
            </div>
            
            <div class="card">
                <div class="card-title">⭐ Последние покупки</div>
                <div class="activity-list" id="recentPurchases"></div>
            </div>
        </div>
    </div>
    
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                document.getElementById('totalDreams').textContent = data.total_dreams;
                document.getElementById('dreamsWithImages').textContent = `с картинками: ${data.dreams_with_images}`;
                document.getElementById('totalStars').textContent = data.total_stars;
                document.getElementById('totalPurchases').textContent = `покупок: ${data.total_purchases}`;
                document.getElementById('totalUsers').textContent = data.total_users;
                
                // График
                const chart = document.getElementById('chartContainer');
                chart.innerHTML = '';
                data.chart_data.forEach(val => {
                    const bar = document.createElement('div');
                    bar.className = 'chart-bar';
                    bar.style.height = `${Math.max(20, val * 20)}px`;
                    chart.appendChild(bar);
                });
                
                // Боты
                const botsGrid = document.getElementById('botsGrid');
                botsGrid.innerHTML = '';
                for (const [bot, status] of Object.entries(data.bots_status)) {
                    const div = document.createElement('div');
                    div.className = 'bot-item';
                    div.innerHTML = `
                        <span>${bot}</span>
                        <span class="bot-status status-${status}"></span>
                    `;
                    botsGrid.appendChild(div);
                }
                
                // Сны
                const dreamsDiv = document.getElementById('recentDreams');
                dreamsDiv.innerHTML = data.recent_dreams.map(d => `
                    <div class="activity-item">
                        <div><strong>${d.bot}</strong></div>
                        <div>${d.text}</div>
                        <div><small>${d.time}</small></div>
                    </div>
                `).join('') || 'Нет данных';
                
                // Покупки
                const purchasesDiv = document.getElementById('recentPurchases');
                purchasesDiv.innerHTML = data.recent_purchases.map(p => `
                    <div class="activity-item">
                        <div>👤 ${p.user}</div>
                        <div>⭐ ${p.stars}</div>
                        <div><small>${p.time}</small></div>
                    </div>
                `).join('') || 'Нет данных';
                
            } catch (e) {
                console.error(e);
            }
        }
        
        loadStats();
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
<!-- Вкладка магазина -->
<div class="card" style="margin-top: 30px;">
    <div class="card-title">
        <span>🛍️</span> Магазин ботов
    </div>
    <div class="shop-grid" id="shopGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;">
        <!-- Заполняется через JS -->
    </div>
</div>

<script>
// Загрузка товаров
async function loadShop() {
    try {
        const res = await fetch('/api/shop/products');
        const products = await res.json();
        
        const grid = document.getElementById('shopGrid');
        grid.innerHTML = '';
        
        for (const [key, product] of Object.entries(products)) {
            const card = document.createElement('div');
            card.className = 'bot-item';
            card.style.flexDirection = 'column';
            card.style.alignItems = 'flex-start';
            card.innerHTML = `
                <h3>${product.name}</h3>
                <p>${product.description}</p>
                <p><strong>Цена:</strong> ${product.price_rub} ₽ / ${product.price_stars} Stars</p>
                <p><strong>Установка:</strong> ${product.setup_time}</p>
                <button onclick="buyBot('${key}')" class="refresh-btn">Купить</button>
            `;
            grid.appendChild(card);
        }
    } catch (e) {
        console.error(e);
    }
}

function buyBot(botType) {
    const domain = prompt("Введите домен для вашего бота (например, mybot.ru):");
    const email = prompt("Введите ваш email для уведомлений:");
    
    fetch('/api/shop/order', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({bot_type: botType, domain: domain, email: email})
    }).then(res => res.json()).then(data => {
        alert('✅ Заказ принят! Мы свяжемся с вами в течение часа.');
    });
}

// Загружаем магазин при старте
loadShop();
</script>
